name: MLOps A 5 Full CI/CD Pipeline
on:
    push:
jobs:
    validate:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                python-version: '3.10'
            - name: Install dependencies
              run: pip install -r requirements.txt
              
            - name: Configure DVC remote credentials
              run: |
                dvc remote modify dagshub --local auth basic
                dvc remote modify dagshub --local user ${{ secrets.DAGSHUB_USERNAME }}
                dvc remote modify dagshub --local password ${{ secrets.DAGSHUB_TOKEN }}

            - name: Pull data via DVC
              run: dvc pull data/heart.csv

            - name: Train model
              env:
                    MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
                    MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
                    MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
              run: python app/train.py

            - name: Upload model_info artifact
              uses: actions/upload-artifact@v4
              with:
                name: model-info
                path: model_info.txt

    deploy:
        runs-on: ubuntu-latest
        needs: validate

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                python-version: '3.10'

            - name: Install dependencies
              run: pip install -r requirements.txt

            - name: Download model_info artifact
              uses: actions/download-artifact@v4
              with:
                name: model-info

            - name: Check accuracy thrshld
              env:
                MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
                MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
                MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
              run: python app/check_threshold.py

            - name: Mock Docker build
              run: |
               echo "Building Docker img for Run ID: $(cat model_info.txt)"
